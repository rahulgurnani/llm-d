apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefill
spec:
  replicas: 4 # Reduced replicas to fit TP=4/TP=8 on A3 Ultra nodes.
  template:
    spec:
      containers:
        - name: modelserver
          command: ["python3", "-m", "sglang.launch_server"]
          args:
            - "--model-path=openai/gpt-oss-120b"
            - "--port=8000"
            - "--host=0.0.0.0"
            - "--disaggregation-mode=prefill"
            - "--disaggregation-transfer-backend=nixl"
            # For 120B model, TP=4 or TP=8 is required to avoid CUDA OOM.
            # If restarts cause "unbalanced memory" errors, delete the deployment entirely and redeploy.
            - "--tensor-parallel-size=4"
            - "--log-level=info"
            - "--enable-metrics"
            - "--uvicorn-access-log-exclude-prefixes=/metrics"
          resources:
            limits:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "4"
            requests:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "4"
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - name: metrics-volume
              mountPath: /.config
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: metrics-volume
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "16Gi"

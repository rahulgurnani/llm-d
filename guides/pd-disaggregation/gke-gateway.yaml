# This Gateway is shared across all pd-disaggregation guides on GKE.
# It uses an internal load balancer (gke-l7-rilb); traffic is confined to the VPC.
# For production deployments with sensitive workloads, consider adding a TLS listener
# and replacing allowedRoutes.namespaces.from: All with a label-based selector
# to prevent arbitrary namespaces from attaching HTTPRoutes.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-inference-gateway
  namespace: llm-d-pd-disaggregation
spec:
  gatewayClassName: gke-l7-rilb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

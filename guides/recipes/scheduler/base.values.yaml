## Base values shared by both standalone and llm-d Router charts.
## Layer chart-specific or guide-specific overrides on top with additional -f flags.

inferenceExtension:
  replicas: 1
  image:
    # Image override for helm chart version 1.4 below
    hub: ghcr.io/llm-d
    name: llm-d-inference-scheduler
    # Image override for helm chart version 1.5 and above
    registry: ghcr.io
    repository: llm-d/llm-d-inference-scheduler
    tag: v0.8.0
  flags:
    v: 2
